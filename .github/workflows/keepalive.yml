name: Render keepalive

on:
  schedule:
    # A cada 10 min — evita o Render Free hibernar (~15 min sem tráfego)
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: GET /health
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          if [ -z "$RENDER_HEALTH_URL" ]; then
            echo "Configure o secret RENDER_HEALTH_URL no GitHub"
            echo "Ex: https://bottelegram.onrender.com/health"
            exit 1
          fi
          curl -fsS --max-time 60 "$RENDER_HEALTH_URL"
          echo ""
          echo "Keepalive OK"
