name: Keep Render Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render Health
        run: |
          echo "Pinging Render..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://bottelegram-4x4n.onrender.com/health)
          echo "Response: $RESPONSE"

          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Health check failed!"
            exit 1
          else
            echo "✅ Bot alive"
          fi
