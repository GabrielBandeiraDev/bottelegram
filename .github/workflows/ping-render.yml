name: Keep Render Alive

on:
  schedule:
    - cron: "*/10 * * * *"  # a cada 10 minutos
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render Health
        run: |
          echo "Pinging Render..."
          curl -s -o /dev/null -w "%{http_code}" https://bottelegram-4x4n.onrender.com/health
